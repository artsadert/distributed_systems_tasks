services:
  postgres:
    image: postgres:15
    container_name: isolation_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: isolation_demo
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d isolation_demo"]
      interval: 1s
      timeout: 3s
      retries: 30